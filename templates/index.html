<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>keyforge</title>
  <script src="{{ url_for('static', filename='disguise_templates.js') }}"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .site-header {
      font-size: 1.8rem;
      font-weight: 700;
      color: #4f46e5;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .card-actions {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 2px;
    }

    .card-action-left {
      position: absolute;
      top: 14px;
      left: 14px;
    }

    .card-action-btn {
      background: none;
      border: none;
      font-size: 0.72rem;
      color: #9ca3af;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .card-action-btn:hover {
      color: #4f46e5;
      background: #f0f0ff;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 8px;
      text-align: center;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-actions {
      position: absolute;
      right: 10px;
      display: flex;
      gap: 2px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: #9ca3af;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .icon-btn:hover {
      color: #4f46e5;
      background: #f0f0ff;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 76px 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: #4f46e5;
    }

    .conditions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .condition {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: #6b7280;
      transition: color 0.25s;
    }

    .condition.met {
      color: #16a34a;
    }

    .checkmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid #d1d5db;
      flex-shrink: 0;
      transition: background 0.25s, border-color 0.25s;
    }

    .checkmark svg {
      display: none;
      width: 12px;
      height: 12px;
    }

    .condition.met .checkmark {
      background: #16a34a;
      border-color: #16a34a;
    }

    .condition.met .checkmark svg {
      display: block;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #f0f2f5;
      margin: 24px 0;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4f46e5;
    }

    .input-wrapper input[type="text"] {
      padding-right: 76px;
    }

    .export-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .export-btn:hover:not(:disabled) {
      background: #4338ca;
    }

    .export-btn:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* Disguise overlay */
    .disguised .site-header,
    .disguised .card {
      display: none;
    }

    #dummy-ui {
      display: none;
      position: fixed;
      inset: 0;
      background: #f7f8fa;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .disguised #dummy-ui {
      display: flex;
    }

    .dummy-header {
      font-size: 1.6rem;
      font-weight: 700;
      color: #16a34a;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
    }

    .dummy-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.09);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    .dummy-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .dummy-add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .dummy-add-row input:focus {
      border-color: #16a34a;
    }

    .dummy-add-btn {
      padding: 10px 18px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dummy-add-btn:hover {
      background: #15803d;
    }

    .dummy-task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .dummy-task {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: #374151;
    }

    .dummy-task input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #16a34a;
      cursor: pointer;
      flex-shrink: 0;
    }

    .dummy-task span {
      flex: 1;
      transition: color 0.2s;
    }

    .dummy-task.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .dummy-task-del {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .dummy-task-del:hover {
      color: #ef4444;
    }

    .dummy-back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .dummy-back-btn:hover {
      color: #16a34a;
      background: #f0fdf4;
    }

    .dummy-footer {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <header class="site-header">keyforge</header>
  <div class="card">
    <div class="card-action-left">
      <button type="button" class="card-action-btn" id="disguise-btn">Disguise</button>
    </div>
    <div class="card-actions">
      <button type="button" class="card-action-btn" id="clear-btn">Clear</button>
      <button type="button" class="card-action-btn" id="wipe-btn">Wipe clipboard</button>
    </div>
    <h1>Create a Password</h1>
    <label for="password">Password</label>
    <div class="input-wrapper">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password">
      <div class="input-actions">
        <button type="button" class="icon-btn" id="copy-btn" title="Copy to clipboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        <button type="button" class="icon-btn" id="reveal-btn" title="Show password">
          <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="conditions">
      <div class="condition" id="cond-length">
        <span class="checkmark">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        At least 8 characters
      </div>
      <div class="condition" id="cond-uppercase">
        <span class="checkmark">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Contains an uppercase letter
      </div>
      <div class="condition" id="cond-number">
        <span class="checkmark">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Contains a number
      </div>
      <div class="condition" id="cond-special">
        <span class="checkmark">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Contains a special character
      </div>
    </div>

    <hr class="divider">
    <label for="hint">Password Hint</label>
    <input type="text" id="hint" placeholder="e.g. My dog's name" autocomplete="off">

    <button class="export-btn" id="export-btn" disabled>Export as .txt</button>
  </div>

  <div id="dummy-ui">
    <button class="dummy-back-btn" id="dummy-back-btn" title="Back to keyforge">&#8592;</button>
    <div class="dummy-header">✓ daily tasks</div>
    <div class="dummy-card">
      <div class="dummy-add-row">
        <input type="text" id="dummy-input" placeholder="Add a task…" autocomplete="off">
        <button class="dummy-add-btn" id="dummy-add-btn">Add</button>
      </div>
      <div class="dummy-task-list" id="dummy-task-list">
        <div class="dummy-task">
          <input type="checkbox"><span>Buy groceries</span>
          <button class="dummy-task-del" aria-label="Delete">✕</button>
        </div>
        <div class="dummy-task">
          <input type="checkbox"><span>Call dentist</span>
          <button class="dummy-task-del" aria-label="Delete">✕</button>
        </div>
        <div class="dummy-task done">
          <input type="checkbox" checked><span>Reply to emails</span>
          <button class="dummy-task-del" aria-label="Delete">✕</button>
        </div>
      </div>
      <div class="dummy-footer" id="dummy-footer"></div>
    </div>
  </div>

  <script>
    const input     = document.getElementById("password");
    const hintInput = document.getElementById("hint");
    const exportBtn = document.getElementById("export-btn");
    const copyBtn   = document.getElementById("copy-btn");
    const revealBtn = document.getElementById("reveal-btn");
    const clearBtn  = document.getElementById("clear-btn");
    const wipeBtn   = document.getElementById("wipe-btn");
    const iconEye    = document.getElementById("icon-eye");
    const iconEyeOff = document.getElementById("icon-eye-off");

    const iconCheck = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const iconClip  = copyBtn.innerHTML;

    copyBtn.addEventListener("click", () => {
      if (!input.value) return;
      navigator.clipboard.writeText(input.value).then(() => {
        copyBtn.innerHTML = iconCheck;
        setTimeout(() => { copyBtn.innerHTML = iconClip; }, 1500);
      });
    });

    revealBtn.addEventListener("click", () => {
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      iconEye.style.display    = isHidden ? "none"  : "";
      iconEyeOff.style.display = isHidden ? ""      : "none";
      revealBtn.title = isHidden ? "Hide password" : "Show password";
    });

    const rules = [
      { id: "cond-length",    test: v => v.length >= 8,                                         label: "At least 8 characters" },
      { id: "cond-uppercase", test: v => /[A-Z]/.test(v),                                       label: "Contains an uppercase letter" },
      { id: "cond-number",    test: v => /[0-9]/.test(v),                                       label: "Contains a number" },
      { id: "cond-special",   test: v => /[!@#$%^&*()\-_=+\[\]{}|;:'",.<>?/\\`~]/.test(v),    label: "Contains a special character" },
    ];

    function allMet(val) {
      return rules.every(({ test }) => test(val));
    }

    input.addEventListener("input", () => {
      const val = input.value;
      rules.forEach(({ id, test }) => {
        document.getElementById(id).classList.toggle("met", test(val));
      });
      exportBtn.disabled = val.length === 0;
    });

    function redact(password) {
      const chars = password.split("").map(ch => Math.random() < 0.3 ? "█" : ch);
      if (password.length < 8 && !chars.includes("█")) {
        chars[Math.floor(Math.random() * chars.length)] = "█";
      }
      return chars.join("");
    }

    clearBtn.addEventListener("click", () => {
      input.value     = "";
      hintInput.value = "";
      rules.forEach(({ id, test }) => {
        document.getElementById(id).classList.toggle("met", test(""));
      });
      exportBtn.disabled = true;
      if (input.type === "text") {
        input.type = "password";
        iconEye.style.display    = "";
        iconEyeOff.style.display = "none";
        revealBtn.title = "Show password";
      }
    });

    wipeBtn.addEventListener("click", () => {
      navigator.clipboard.writeText("​").then(() => {
        const orig = wipeBtn.textContent;
        wipeBtn.textContent  = "Wiped!";
        wipeBtn.style.color  = "#16a34a";
        setTimeout(() => {
          wipeBtn.textContent = orig;
          wipeBtn.style.color = "";
        }, 1500);
      });
    });

    exportBtn.addEventListener("click", () => {
      const password = input.value;
      const hint     = hintInput.value.trim() || "(none)";
      const redacted = redact(password);

      const validatorLines = rules.map(({ test, label }) => (test(password) ? "✓" : "✗") + " " + label);

      const passwordSection = [
        "Password Hint: " + hint,
        "",
        "Password Requirements:",
        ...validatorLines,
        "",
        "Password:      " + redacted,
        "",
        password.length < 8
          ? "Note: At least 1 character has been replaced with █."
          : "Note: ~30% of characters have been replaced with █.",
      ].join("\n");

      const template = DISGUISE_TEMPLATES[Math.floor(Math.random() * DISGUISE_TEMPLATES.length)];

      const today   = new Date();
      const dateStr = today.getFullYear().toString()
        + String(today.getMonth() + 1).padStart(2, "0")
        + String(today.getDate()).padStart(2, "0");

      const content = template.content + "\n\n\n\n\n" + passwordSection;

      const blob = new Blob([content], { type: "text/plain" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = template.filename + "_" + dateStr + ".txt";
      a.click();
      URL.revokeObjectURL(url);
    });

    // Disguise
    const disguiseBtn   = document.getElementById("disguise-btn");
    const dummyBackBtn  = document.getElementById("dummy-back-btn");
    const dummyInput    = document.getElementById("dummy-input");
    const dummyAddBtn   = document.getElementById("dummy-add-btn");
    const dummyTaskList = document.getElementById("dummy-task-list");
    const dummyFooter   = document.getElementById("dummy-footer");

    function updateDummyFooter() {
      const tasks     = dummyTaskList.querySelectorAll(".dummy-task");
      const remaining = dummyTaskList.querySelectorAll(".dummy-task:not(.done)").length;
      dummyFooter.textContent = tasks.length === 0 ? "No tasks" : `${remaining} remaining`;
    }

    function attachTaskEvents(taskEl) {
      const cb  = taskEl.querySelector("input[type='checkbox']");
      const del = taskEl.querySelector(".dummy-task-del");
      cb.addEventListener("change", () => {
        taskEl.classList.toggle("done", cb.checked);
        updateDummyFooter();
      });
      del.addEventListener("click", () => {
        taskEl.remove();
        updateDummyFooter();
      });
    }

    dummyTaskList.querySelectorAll(".dummy-task").forEach(attachTaskEvents);
    updateDummyFooter();

    function addDummyTask() {
      const text = dummyInput.value.trim();
      if (!text) return;
      const task = document.createElement("div");
      task.className = "dummy-task";
      task.innerHTML = `<input type="checkbox"><span>${text.replace(/</g, "&lt;")}</span><button class="dummy-task-del" aria-label="Delete">✕</button>`;
      dummyTaskList.appendChild(task);
      attachTaskEvents(task);
      dummyInput.value = "";
      updateDummyFooter();
    }

    dummyAddBtn.addEventListener("click", addDummyTask);
    dummyInput.addEventListener("keydown", e => { if (e.key === "Enter") addDummyTask(); });

    disguiseBtn.addEventListener("click", () => {
      document.body.classList.add("disguised");
      document.title = "Daily Tasks";
      dummyInput.focus();
    });

    function undisguise() {
      document.body.classList.remove("disguised");
      document.title = "keyforge";
    }

    dummyBackBtn.addEventListener("click", undisguise);

    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && document.body.classList.contains("disguised")) undisguise();
    });
  </script>
</body>
</html>
